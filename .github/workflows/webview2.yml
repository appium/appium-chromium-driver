name: webview2-sample-smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  webview2-smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      NODE_VERSION: '20'
      DOTNET_VERSION: '8.0.x'
      WEBVIEW2_REPO_DIR: WebView2Samples
      WEBVIEW2_SAMPLE_DIR: WebView2Samples/SampleApps/WebView2WpfCompositionControl
      WEBVIEW2_PROJECT: WebView2Samples/SampleApps/WebView2WpfCompositionControl/WebView2WpfCompositionControl/WebView2WpfCompositionControl.csproj
      WEBVIEW2_TARGET_FRAMEWORK: net8.0-windows10.0.22000.0
      WEBVIEW2_EXE: WebView2Samples/SampleApps/WebView2WpfCompositionControl/WebView2WpfCompositionControl/bin/Debug/net8.0-windows10.0.22000.0/WebView2WpfCompositionControl.exe

    steps:
      - name: Checkout appium-chromium-driver
        uses: actions/checkout@v6

      - name: Use Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install repo deps
        shell: powershell
        run: npm install

      - name: Checkout WebView2Samples
        uses: actions/checkout@v6
        with:
          repository: MicrosoftEdge/WebView2Samples
          path: ${{ env.WEBVIEW2_REPO_DIR }}

      - name: Install WebView2 Runtime
        shell: powershell
        run: |
          Invoke-WebRequest 'https://go.microsoft.com/fwlink/p/?LinkId=2124703' -OutFile "$env:TEMP\wv2setup.exe"
          Start-Process "$env:TEMP\wv2setup.exe" -ArgumentList '/silent','/install' -Wait

      - name: Build WebView2 .NET 8 sample
        shell: powershell
        run: |
          dotnet restore "${env:WEBVIEW2_PROJECT}" -p:TargetFramework="${env:WEBVIEW2_TARGET_FRAMEWORK}"
          dotnet build "${env:WEBVIEW2_PROJECT}" -c Debug -f "${env:WEBVIEW2_TARGET_FRAMEWORK}"

      - name: Verify built app exists
        shell: powershell
        run: |
          if (!(Test-Path "${env:WEBVIEW2_EXE}")) {
            Write-Error "Built executable not found at ${env:WEBVIEW2_EXE}"
          }
          Get-Item "${env:WEBVIEW2_EXE}" | Format-List FullName,Length

      - name: Configure Appium Server
        shell: bash
        run: |
          appium_ver=$(node -p "require('./package.json').peerDependencies?.appium")
          npm install -g "appium@$appium_ver"
          cwd=$(pwd)
          pushd "$cwd"
          cd ~
          appium driver install --source=local "$cwd"
          popd


      - name: Run WebView2 smoke test via appium-chromium-driver
        shell: powershell
        env:
          WEBVIEW2_EXE: ${{ env.WEBVIEW2_EXE }}
        run: |
          node build/test/webview2/test.js
