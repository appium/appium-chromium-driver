name: E2E Tests
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '*.md'

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    name: E2E Tests
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install
      - name: Configure Appium Server
        shell: bash
        run: |
          appium_ver=$(node -p "require('./package.json').peerDependencies?.appium")
          npm install -g "appium@$appium_ver"
          cwd=$(pwd)
          pushd "$cwd"
          cd ~
          appium driver install --source=local "$cwd"
          popd
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest
        id: setup-chrome
        with:
          chrome-version: stable
      - name: Configure Chrome
        shell: bash
        run: echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
      - name: Run E2E tests
        shell: bash
        run: TEST_PLATFORM="${{ runner.os }}" npm run test:e2e
